<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baru Adapters</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 28px 40px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    header p {
      color: #666;
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      padding: 32px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #333; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    .tags { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }

    .tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tag-demo     { background: #1a3a1a; color: #5c5; }
    .tag-core     { background: #1a2a3a; color: #59f; }
    .tag-blueprint { background: #2a2a1a; color: #ba5; }
    .tag-finance  { background: #1a1a2a; color: #97f; }
    .tag-scheduling { background: #1a2a2a; color: #5cf; }
    .tag-robotics { background: #2a1a2a; color: #f7a; }
    .tag-vision   { background: #2a1a1a; color: #f77; }
    .tag-music    { background: #1a2a1a; color: #7f9; }
    .tag-toolkit    { background: #2a1a3a; color: #c7f; }
    .tag-geospatial { background: #1a2a1a; color: #4d9; }

    .card p {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.5;
      flex: 1;
    }

    .card-footer {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn-run {
      background: #1a472a;
      color: #5c5;
      border: 1px solid #2a5a2a;
    }

    .btn-run:hover { background: #1f5a30; }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-source {
      background: #1a1a2a;
      color: #779;
      border: 1px solid #222;
    }

    .btn-source:hover { background: #222232; }

    .output-area {
      display: none;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      color: #aaa;
      white-space: pre;
      overflow-x: auto;
      max-height: 360px;
      overflow-y: auto;
      line-height: 1.55;
      margin-top: 4px;
    }

    .output-area.visible { display: block; }
    .output-area.error { color: #f77; }
    .output-area.ok { color: #7c7; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #333;
      border-top-color: #5c5;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .blueprint-note {
      font-size: 0.75rem;
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>

<header>
  <h1>Baru Adapters</h1>
  <p>{{ adapters | length }} adapters — segment-swap engine for any domain</p>
</header>

<div class="grid">
  {% for a in adapters %}
  <div class="card" id="card-{{ a.id }}">
    <div class="card-header">
      <h2>{{ a.name }}</h2>
      <div class="tags">
        {% for t in a.tags %}
        <span class="tag tag-{{ t }}">{{ t }}</span>
        {% endfor %}
      </div>
    </div>
    <p>{{ a.desc }}</p>
    <div class="card-footer">
      {% if a.runnable %}
      <button class="btn-run" onclick="runAdapter('{{ a.id }}', this)">Run</button>
      {% else %}
      <span class="blueprint-note">Blueprint only — no runnable demo yet</span>
      {% endif %}
      <button class="btn-source" onclick="showSource('{{ a.id }}', this)">Source</button>
    </div>
    <div class="output-area" id="output-{{ a.id }}"></div>
  </div>
  {% endfor %}
</div>

<script>
async function runAdapter(id, btn) {
  const out = document.getElementById("output-" + id);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Running…';
  out.className = "output-area visible";
  out.textContent = "";

  try {
    const r = await fetch("/run/" + id);
    const data = await r.json();
    out.textContent = data.output || data.error;
    out.className = "output-area visible " + (data.ok ? "ok" : "error");
  } catch(e) {
    out.textContent = "Error: " + e.message;
    out.className = "output-area visible error";
  }

  btn.disabled = false;
  btn.textContent = "Run again";
}

async function showSource(id, btn) {
  const out = document.getElementById("output-" + id);

  if (out.dataset.showing === "source") {
    out.className = "output-area";
    out.dataset.showing = "";
    btn.textContent = "Source";
    return;
  }

  btn.textContent = "Hide";
  out.className = "output-area visible";
  out.textContent = "Loading…";

  try {
    const r = await fetch("/source/" + id);
    const data = await r.json();
    out.textContent = "── " + data.file + " ──\n\n" + data.source;
    out.dataset.showing = "source";
  } catch(e) {
    out.textContent = "Error: " + e.message;
  }
}
</script>

</body>
</html>
